<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Site Photo Geotagger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #preview-canvas {
            max-width: 100%;
            height: auto;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 font-sans">

    <div class="max-w-7xl mx-auto px-4 py-8">
        <header class="mb-8 border-b border-gray-300 pb-4">
            <h1 class="text-3xl font-bold text-slate-800">Pro Site Photo Geotagger</h1>
            <p class="text-gray-600">High-fidelity progress reporting tool.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 lg:col-span-1 space-y-5">
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">1. Upload Site Photo</label>
                    <input type="file" id="imageInput" accept="image/*" class="w-full border border-gray-300 rounded-md p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>

                <hr class="border-gray-200">

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Project / Site Title</label>
                    <input type="text" id="locTitle" placeholder="e.g., Olenguruone Main Block" class="w-full border border-gray-300 rounded-md p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none" oninput="updateCanvas()">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Specific Location / Task</label>
                    <input type="text" id="locAddress" placeholder="e.g., Ground Floor Slab Pouring" class="w-full border border-gray-300 rounded-md p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none" oninput="updateCanvas()">
                </div>

                <div class="bg-slate-50 p-4 rounded-lg border border-slate-200">
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-semibold text-slate-800">GPS Coordinates</label>
                        <button onclick="getLocation()" class="bg-blue-100 hover:bg-blue-200 text-blue-700 text-xs font-bold py-1 px-3 rounded-full transition">
                            📍 Auto-Detect
                        </button>
                    </div>
                    <div class="flex gap-3">
                        <div class="w-1/2">
                            <label class="block text-[11px] text-gray-500 uppercase tracking-wide">Latitude</label>
                            <input type="text" id="lat" placeholder="-0.573492" class="w-full border border-gray-300 rounded p-2 text-sm" oninput="updateCanvas()">
                        </div>
                        <div class="w-1/2">
                            <label class="block text-[11px] text-gray-500 uppercase tracking-wide">Longitude</label>
                            <input type="text" id="lng" placeholder="35.614589" class="w-full border border-gray-300 rounded p-2 text-sm" oninput="updateCanvas()">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Timestamp</label>
                    <input type="text" id="dateTime" placeholder="Auto-fills on upload..." class="w-full border border-gray-300 rounded-md p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none" oninput="updateCanvas()">
                </div>

                <button onclick="downloadImage()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 px-4 rounded-md transition duration-200 shadow-md">
                    ⬇ Download Stamped Photo
                </button>
            </div>

            <div class="lg:col-span-2 bg-gray-200/50 rounded-xl flex items-center justify-center p-4 border-2 border-dashed border-gray-300 min-h-[500px]">
                <canvas id="preview-canvas" class="hidden"></canvas>
                <div id="placeholder-text" class="text-center">
                    <svg class="mx-auto h-12 w-12 text-gray-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <p class="text-gray-500 font-medium">Upload a site photo to preview the layout</p>
                </div>
            </div>

        </div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const canvas = document.getElementById('preview-canvas');
        const ctx = canvas.getContext('2d');
        const placeholderText = document.getElementById('placeholder-text');
        
        let uploadedImage = null;

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                uploadedImage = new Image();
                uploadedImage.onload = function() {
                    canvas.classList.remove('hidden');
                    placeholderText.classList.add('hidden');
                    
                    if(!document.getElementById('dateTime').value) {
                        const now = new Date();
                        // Formatting to look like: "Tuesday, 17/03/2026 13:57 PM"
                        const options = { weekday: 'short', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' };
                        document.getElementById('dateTime').value = now.toLocaleDateString('en-GB', options) + ' EAT';
                    }
                    updateCanvas();
                }
                uploadedImage.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // HTML5 Geolocation API
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        document.getElementById('lat').value = position.coords.latitude.toFixed(6);
                        document.getElementById('lng').value = position.coords.longitude.toFixed(6);
                        updateCanvas();
                    },
                    function(error) {
                        alert("Unable to retrieve location. Please ensure location services are enabled on your device/browser.");
                    },
                    { enableHighAccuracy: true } // Requests GPS hardware if available
                );
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        }

        function updateCanvas() {
            if (!uploadedImage) return;

            canvas.width = uploadedImage.width;
            canvas.height = uploadedImage.height;
            ctx.drawImage(uploadedImage, 0, 0);

            // Get Inputs
            const title = document.getElementById('locTitle').value || "Project Title";
            const address = document.getElementById('locAddress').value || "Location Details";
            const lat = document.getElementById('lat').value || "0.000000";
            const lng = document.getElementById('lng').value || "0.000000";
            const date = document.getElementById('dateTime').value || "Timestamp";

            // Elegant Proportions
            const cardMargin = canvas.width * 0.03;
            const cardPadding = canvas.width * 0.02;
            const cardWidth = canvas.width - (cardMargin * 2);
            
            // Calculate Font Sizes dynamically based on image width
            const titleSize = Math.floor(canvas.width * 0.025);
            const subSize = Math.floor(canvas.width * 0.018);
            const lineSpacing = subSize * 1.5;

            // Calculate Card Height
            const cardHeight = (cardPadding * 2) + titleSize + (lineSpacing * 2) + (canvas.width * 0.01);
            const startY = canvas.height - cardHeight - cardMargin;

            // 1. Draw Sleek Rounded Card Background
            ctx.fillStyle = 'rgba(15, 23, 42, 0.75)'; // Dark Slate with transparency
            // Using standard fillRect to ensure compatibility, but styled elegantly
            ctx.fillRect(cardMargin, startY, cardWidth, cardHeight);

            // 2. Draw "Construction Yellow" Accent Line
            const accentWidth = canvas.width * 0.008;
            ctx.fillStyle = '#EAB308'; // Tailwind Yellow-500
            ctx.fillRect(cardMargin, startY, accentWidth, cardHeight);

            // 3. Setup Text Drawing
            ctx.textBaseline = 'top';
            let currentTextY = startY + cardPadding;
            const textStartX = cardMargin + accentWidth + cardPadding;

            // 4. Draw Title
            ctx.fillStyle = '#FFFFFF';
            ctx.font = `bold ${titleSize}px "Segoe UI", Roboto, Helvetica, Arial, sans-serif`;
            ctx.fillText(title, textStartX, currentTextY);
            
            // Move down
            currentTextY += titleSize + (canvas.width * 0.01);

            // 5. Draw Address / Details
            ctx.font = `normal ${subSize}px "Segoe UI", Roboto, Helvetica, Arial, sans-serif`;
            ctx.fillStyle = '#E2E8F0'; // Slate-200 (Slightly off-white for hierarchy)
            ctx.fillText(address, textStartX, currentTextY);

            currentTextY += lineSpacing;

            // 6. Draw GPS & Timestamp (Side by Side if possible, or stacked)
            ctx.font = `normal ${subSize}px "Segoe UI", Roboto, Helvetica, Arial, sans-serif`;
            ctx.fillStyle = '#94A3B8'; // Slate-400 (Muted for secondary info)
            const metaText = `📍 GPS: ${lat}, ${lng}   |   🕒 ${date}`;
            ctx.fillText(metaText, textStartX, currentTextY);
            
            // 7. Add Watermark Logo (Bottom Right of the card)
            ctx.textAlign = 'right';
            ctx.font = `bold ${subSize * 0.9}px "Segoe UI", Roboto, Helvetica, Arial, sans-serif`;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillText("Verified Tracker", cardMargin + cardWidth - cardPadding, startY + cardPadding);
            ctx.textAlign = 'left'; // reset
        }

        function downloadImage() {
            if (!uploadedImage) return alert("Please upload an image first.");
            const dataURL = canvas.toDataURL('image/jpeg', 0.95);
            const link = document.createElement('a');
            link.download = `Site_Photo_${Date.now()}.jpg`;
            link.href = dataURL;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
